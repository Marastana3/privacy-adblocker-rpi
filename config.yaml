dns:
  listen_host: "0.0.0.0"
  listen_port: 5300
  upstream_dns: "1.1.1.1"
  upstream_port: 53
  sinkhole_ip: "0.0.0.0"

blocking:
  blocklists_dir: "dns_engine/blocklists"
  disabled_categories: []   # e.g. ["telemetry"] to keep those lists but stop blocking them
  # Optional public lists to merge in via the updater (category: [urls]):
  # remote_sources:
  #   ads:
  #     - "https://example.com/ads-hosts.txt"

privacy:
  mode: "strict"          # strict | balanced | debug
  logging_enabled: false
  retention_days: 7        # events older than this are pruned automatically
  db_path: "adblocker.db"  # relative paths resolve against the repo root